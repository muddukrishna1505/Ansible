---
- name: printing variables
  hosts: localhost #localhost is a special inventory name that refers to the local machine where the playbook is being executed.
  connection: local
  vars_files:  # include the variables from the course.yaml file
  - course.yaml #course.yaml should be as a list item under vars_files
  tasks:
  - name: printing the var info
    debug:
      msg: " {{ learner }} is learning {{ course }} under guidance of {{ trainer }}."
      
    