- name: letters change to uppercase
  hosts: local
  connection: local

  vars:
    full_name: Muddukrishna Bellamkonda
    ip_address: 172.33.45.56

  tasks:
  - name: name converting to uppercase
    debug:
      msg: "{{ full_name | upper }}"

  - name: name converting to lowercase
    debug:
      msg: "{{ full_name | lower }}"   

  - name: check ipv4 address
    debug:
      msg: "{{ ip_address | ansible.utils.ipv4 }}"    